services:
  # Web Service - Spring Boot API
  - type: web
    name: daos-learning-center-api
    env: java
    region: oregon
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT $JAVA_OPTS -jar target/learning-center-platform-small-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8091
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: DATABASE_URL
        fromDatabase:
          name: learningcenter-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: learningcenter-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: learningcenter-db
          property: password
    healthCheckPath: /actuator/health

databases:
  # PostgreSQL Database
  - name: learningcenter-db
    databaseName: learningcenter_prod
    plan: free
    region: oregon